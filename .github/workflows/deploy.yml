name: Deploy

# git push to main -> build nothing (static for now) -> sync to droplet -> reload nginx.
# Only the SAFE apply.sh runs here (site + nginx config). Server provisioning
# (sshd/ufw/etc.) is intentionally NOT automated — run scripts/provision.sh by hand.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "infra/nginx/**"
      - "scripts/apply.sh"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync repo to droplet
        run: |
          rsync -az --delete \
            --exclude '.git' \
            -e "ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:mitchell-cook-dev/"

      - name: Apply on droplet
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "sudo bash ~/mitchell-cook-dev/scripts/apply.sh"
