# Managed hardening overrides — installed to /etc/ssh/sshd_config.d/99-hardening.conf
# Loads last (99-) so it wins over the cloud-init defaults in the same directory.
PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
KbdInteractiveAuthentication no
X11Forwarding no
MaxAuthTries 3
