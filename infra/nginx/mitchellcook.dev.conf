# mitchellcook.dev — version-controlled nginx site config.
#
# NOTE: This repo owns this file, NOT certbot. Certbot manages only the
# certificate FILES under /etc/letsencrypt/live/mitchellcook.dev/. Provisioning
# obtains the cert with `certbot certonly` (webroot) so certbot never rewrites
# this server block. That keeps the config reproducible from source.
#
# nginx version note: the droplet runs nginx 1.24.0, where the standalone
# `http2 on;` directive does NOT exist (added in 1.25.1). On 1.24 you enable
# HTTP/2 by adding `http2` to the `listen` lines, as below. When Ubuntu ships
# nginx >= 1.25, switch to `listen ... ssl;` plus a separate `http2 on;`.

# ── HTTP :80 — ACME challenge + redirect everything else to HTTPS ──────────
server {
    listen 80;
    listen [::]:80;
    server_name mitchellcook.dev www.mitchellcook.dev;

    # Let's Encrypt http-01 challenge is served from the webroot (keeps
    # certbot renewals working — never firewall port 80).
    location /.well-known/acme-challenge/ {
        root /var/www/mitchellcook.dev;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — the actual site ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mitchellcook.dev www.mitchellcook.dev;

    root /var/www/mitchellcook.dev;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/mitchellcook.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mitchellcook.dev/privkey.pem;

    # Sane, self-contained TLS settings (no dependency on certbot-managed includes).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;

    # HSTS. Add `; preload` only once you're certain you'll never serve plain HTTP.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ =404;
    }
}
